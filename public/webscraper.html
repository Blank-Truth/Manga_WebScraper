<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebScraper</title>
    <style>
        nav {
            height: 80px;
            width: 100%;
            background-color: burlywood;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
        }

        #my-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 25px;
        }

        .container {
            width: 300px;
            height: 400px;
            background-color: blanchedalmond;
            padding: 15px;
            box-sizing: border-box;
            border-radius: 15px;
        }

        body {
            display: flex;
            justify-content: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-weight: bold;
            margin-top: 10%;
        }

        .inner {
            height: 100%;
            width: 100%;
        }

        button {
            width: 40%;
            height: 40px;
            background-color: burlywood;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            align-self: center;
        }

 
    </style>
</head>
<body>
    <div class="container">
        <div class="inner">
            <nav>
                <p>WebScraper v1.0</p>
            </nav>
            <form action="/api/chapters" method="post" id="my-form">
                <label for="mangaName">Enter Manga Name:
                    <input type="text" id="mangaName" name="title" tabindex="1">
                </label>
                <label for="mangaChapter">Enter Chapter Number:
                    <input type="number" name="chapter" id="mangaChapter" tabindex="2">
                </label>
                <button type="submit">Scrape</button>
            </form>
        </div>
    </div>

    <script>
        const myForm = document.getElementById("my-form")
        const handleFormSubmit = async (event) => {
            event.preventDefault()
            
            const mangaName = document.getElementById("mangaName").value
            const mangaChapter = document.getElementById("mangaChapter").value
            const dataObject = {
                title: mangaName,
                chapter: mangaChapter
            }
            console.log(dataObject)

            async function testMyBackend() {
            
                const response = await fetch('/api/chapters', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }, // The sticky note!
                    body: JSON.stringify(dataObject)             // The payload
                });
                const data = await response.json()
                console.log("Server responded with:", data)
            }

            testMyBackend()
        }
        
        myForm.addEventListener('submit', handleFormSubmit)
    </script>
</body>
</html>
